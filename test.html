<!DOCTYPE html>
<html lang="tr" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPSS Tarih – Test Çöz</title>
    <meta name="description" content="KPSS Tarih soru bankası – 364 soru ile pratik yap.">
    <script>
        // Dark mode init – runs before paint to avoid flash
        (function(){
            const d = localStorage.getItem('dark-mode');
            if(d==='true'||(d===null&&window.matchMedia('(prefers-color-scheme: dark)').matches))
                document.documentElement.classList.add('dark');
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{font-family:'Inter',sans-serif}
        .option-btn{transition:all .22s ease}
        .option-btn:hover:not(:disabled){transform:translateX(5px)}
        .shake{animation:shake .4s ease}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
        .pop{animation:pop .3s ease}
        @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.025)}100%{transform:scale(1)}}
        #testCard{transition:opacity .18s ease,transform .18s ease}
        /* Keyboard hint */
        .key-hint{font-size:11px;opacity:.45;margin-top:6px}
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen transition-colors duration-300">

<!-- Header -->
<header class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-100 dark:border-slate-800">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
        <a href="index.html" class="flex items-center gap-2 text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors font-medium text-sm shrink-0">
            <i class="fas fa-arrow-left"></i><span>Notlara Dön</span>
        </a>
        <!-- Title -->
        <span class="text-sm font-bold text-slate-700 dark:text-slate-200 hidden sm:block">📚 KPSS Tarih Test</span>
        <div class="flex items-center gap-2">
            <!-- Skip button -->
            <button id="skipBtn" title="Soruyu atla (→)" class="text-xs text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 border border-slate-200 dark:border-slate-700 px-3 py-1.5 rounded-xl transition-all hover:bg-slate-100 dark:hover:bg-slate-800">
                Atla <i class="fas fa-forward-step ml-1"></i>
            </button>
            <button id="darkToggle" class="p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-all text-slate-500 dark:text-slate-400">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
            </button>
        </div>
    </div>
</header>

<!-- Main -->
<main class="max-w-3xl mx-auto px-4 py-8">
    <!-- Stats bar -->
    <div class="mb-6 flex items-center gap-3 text-sm">
        <span id="testCounter" class="font-bold text-indigo-600 dark:text-indigo-400 shrink-0">Soru 1 / ?</span>
        <div class="flex-1 h-2 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
            <div id="progressBar" class="h-2 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full transition-all duration-500" style="width:0%"></div>
        </div>
        <span id="scoreCounter" class="font-bold text-emerald-600 dark:text-emerald-400 shrink-0">0 ✓</span>
    </div>

    <!-- Card -->
    <div id="testCard" class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800 p-7 md:p-10">
        <p id="testQuestionText" class="text-lg md:text-xl font-bold text-slate-800 dark:text-white leading-relaxed mb-7">
            Yükleniyor...
        </p>
        <div id="testOptions" class="space-y-2.5"></div>
        <div class="mt-7 flex flex-wrap items-center justify-between gap-3 min-h-[48px]">
            <div id="testFeedback" class="text-sm font-semibold opacity-0 transition-opacity duration-300 flex items-center gap-2"></div>
            <button id="nextQuestionBtn" class="opacity-0 pointer-events-none flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white px-5 py-2.5 rounded-2xl font-bold transition-all duration-200 shadow-md shadow-indigo-200 dark:shadow-none">
                Sonraki Soru <i class="fas fa-arrow-right"></i>
            </button>
        </div>
        <p class="key-hint text-slate-400 dark:text-slate-600 text-center mt-4">A B C D E tuşları ile cevapla · → veya Enter ile geç</p>
    </div>

    <!-- Finish screen -->
    <div id="finishScreen" class="hidden bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800 p-10 text-center">
        <div id="finishEmoji" class="text-6xl mb-4">🎉</div>
        <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-2">Test Tamamlandı!</h2>
        <p id="finalScore" class="text-slate-500 dark:text-slate-400 mb-2"></p>
        <p id="finalRating" class="text-2xl font-bold mb-8"></p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <button onclick="restartTest()" class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white px-6 py-3 rounded-2xl font-bold transition-all">
                <i class="fas fa-redo mr-2"></i>Tekrar Çöz
            </button>
            <a href="index.html" class="bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 px-6 py-3 rounded-2xl font-bold transition-all text-center">
                <i class="fas fa-book mr-2"></i>Notlara Dön
            </a>
        </div>
    </div>
</main>

<script src="assets/js/testQuestions.js"></script>
<script src="assets/js/test.js"></script>
</body>
</html>
